# Hermes custom_providers — wire AgentOS sub-agents to freellmapi.
# Copy the relevant block(s) into ~/.hermes/config.yaml under
# `custom_providers:`. After copying:
#   1. Restart Hermes (new session picks up providers)
#   2. Verify with: hermes config  (or just try a task)
#
# Reference: https://github.com/tashfeenahmed/freellmapi#openai-compatible
# Bradley's review: BradleyVault/wiki/freellmapi-spike.md
#
# WIRED 2026-06-17 — both custom_providers and delegation sections
# in ~/.hermes/config.yaml now point at freellmapi.

custom_providers:
  - name: freellmapi
    base_url: http://100.98.6.47:3001/v1   # Tailscale IP
    api_key: freellmapi-7214f1d90c6b15915a5a45edbcecc0247be306fd4fe71995
    model: auto                            # let freellmapi route

# Delegation (sub-agents) — all Ferret/Scribe/Dev tasks route through
# freellmapi's auto-router, which picks the best available free-tier
# model from enabled providers (Groq, OpenRouter, etc.).
delegation:
  provider: freellmapi
  model: auto
  base_url: http://100.98.6.47:3001/v1
  api_key: freellmapi-7214f1d90c6b15915a5a45edbcecc0247be306fd4fe71995
